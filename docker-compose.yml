services:
  # Primärt lag (Färjestad BK) – port 8080
  farjestad:
    build: .
    container_name: hockeylive-farjestad
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - HOCKEY_CONFIG=/app/config.yaml

