# =============================================================================
# AWTRIX Hockey Live Scoreboard
# =============================================================================
# SETUP: Replace the two placeholders before loading:
#
#   YOUR_TEAM_SLUG   – team slug used by the HACS integration, e.g.:
#                      farjestad_bk  /  hv_71  /  frolunda_hc
#                      Rule: team name lowercased, spaces → underscores
#
#   YOUR_AWTRIX_TOPIC – MQTT topic for your Awtrix device, e.g.:
#                       awtrix_ab12cd/custom/hockey
#
# Quick replace (bash):
#   sed -i 's/YOUR_TEAM_SLUG/farjestad_bk/g; s|YOUR_AWTRIX_TOPIC|awtrix_ab12cd/custom/hockey|g' awtrix_hockey.yaml
#
# After editing, reload automations:
#   Settings → Automations & Scenes → ⋮ → Reload automations
# =============================================================================

# =============================================================================
# AUTOMATION 1: Live scoreboard – updates on score / period / clock changes
# =============================================================================
- alias: "AWTRIX Hockey – Live scoreboard"
  id: awtrix_hockey_live_scoreboard
  description: >
    Pushes a live score line to Awtrix while a game is in progress.
    Triggers on score change, period change, or every 30 s for clock updates.
    Color: green = winning, red = losing, yellow = tied.

  trigger:
    # Game goes live
    - platform: state
      entity_id: binary_sensor.YOUR_TEAM_SLUG_game_live
      to: "on"

    # Score changes
    - platform: state
      entity_id: sensor.YOUR_TEAM_SLUG_live_score

    # Period changes
    - platform: state
      entity_id: sensor.YOUR_TEAM_SLUG_period

    # Clock tick – keep the display fresh every 30 s
    - platform: time_pattern
      seconds: "/30"

  condition:
    - condition: state
      entity_id: binary_sensor.YOUR_TEAM_SLUG_game_live
      state: "on"

  action:
    - variables:
        # Short team abbreviations (max 4 chars)
        home_abbr: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_live_score', 'home_team')
             | truncate(4, true, '', 0) }}
        away_abbr: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_live_score', 'away_team')
             | truncate(4, true, '', 0) }}

        score: "{{ states('sensor.YOUR_TEAM_SLUG_live_score') }}"
        period: "{{ states('sensor.YOUR_TEAM_SLUG_period') }}"
        clock: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_live_score', 'period_clock') or '' }}

        score_for: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_live_score', 'score_for') | int(0) }}
        score_against: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_live_score', 'score_against') | int(0) }}

        # Color: green = winning, red = losing, yellow = tied
        color: >
          {% if score_for > score_against %}#00FF00
          {% elif score_for < score_against %}#FF0000
          {% else %}#FFFF00{% endif %}

        # Combined display text: "FBK 2-1 HV71 | P2 14:32"
        display_text: >
          {{ home_abbr }} {{ score }} {{ away_abbr }} | {{ period -}}
          {%- if clock %} {{ clock }}{% endif %}

    - service: mqtt.publish
      data:
        topic: "YOUR_AWTRIX_TOPIC"
        payload: >
          {
            "text": "{{ display_text | trim }}",
            "color": "{{ color | trim }}",
            "icon": "hockey",
            "duration": 30
          }

# =============================================================================
# AUTOMATION 2: Final score – shown for 60 s when game ends
# =============================================================================
- alias: "AWTRIX Hockey – Final score"
  id: awtrix_hockey_final_score
  description: >
    Fires when the game goes from live → not live and a last result exists.
    Shows "FT: HOME X-Y AWAY" in green (won) or red (lost) for 60 seconds.

  trigger:
    - platform: state
      entity_id: binary_sensor.YOUR_TEAM_SLUG_game_live
      from: "on"
      to: "off"

  condition:
    # Only act if there is an actual result (not a startup/unavailable flip)
    - condition: template
      value_template: >
        {{ states('sensor.YOUR_TEAM_SLUG_last_result')
           not in ['–', 'unknown', 'unavailable'] }}

  action:
    - variables:
        result: "{{ states('sensor.YOUR_TEAM_SLUG_last_result') }}"
        home_team: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_last_result', 'home_team')
             | truncate(4, true, '', 0) }}
        away_team: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_last_result', 'away_team')
             | truncate(4, true, '', 0) }}
        won: >
          {{ state_attr('sensor.YOUR_TEAM_SLUG_last_result', 'won') | default(false) }}

        # Color: green = won, red = lost
        color: >
          {% if won %}#00FF00{% else %}#FF0000{% endif %}

        display_text: >
          FT: {{ home_team }} {{ result }} {{ away_team }}

    - service: mqtt.publish
      data:
        topic: "YOUR_AWTRIX_TOPIC"
        payload: >
          {
            "text": "{{ display_text | trim }}",
            "color": "{{ color | trim }}",
            "icon": "hockey",
            "duration": 60
          }
