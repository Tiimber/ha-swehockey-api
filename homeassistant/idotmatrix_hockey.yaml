# =============================================================================
# iDotMatrix Hockey Scoreboard
# =============================================================================
# Pushes the 32x32 PNG scoreboard to an iDotMatrix display whenever the
# image.demo_scoreboard_32x32 entity updates.
#
# HOW IT WORKS:
#   1. Trigger fires on image.demo_scoreboard_32x32 state change.
#   2. shell_command downloads the PNG from the HA image proxy into
#      /config/www/idotmatrix/hockey_scoreboard.png  (/local/idotmatrix/...)
#   3. idotmatrix.set_face is called with an image layer pointing at that file.
#      The coordinator resolves "hockey_scoreboard.png" relative to
#      config/www/idotmatrix/ (its default base_www path).
#
# SETUP:
#   1. Create the directory on your HA host:
#        mkdir -p /config/www/idotmatrix
#   2. Add to configuration.yaml:
#        shell_command:
#          idotmatrix_fetch_scoreboard: >
#            curl -sf -o /config/www/idotmatrix/hockey_scoreboard.png
#            "http://127.0.0.1:8123/api/image_proxy/image.demo_scoreboard_32x32?token=c2eb3e7f5750b22e621a80e9a09cbdd63d7e54574a1e16c4313a186773ca302d"
#   3. Place this file in config/packages/idotmatrix_hockey.yaml
#      (requires packages support in configuration.yaml — see matrix32_hockey.yaml header)
#
# NOTE: The access_token in the curl URL is the static image-proxy token for
#       image.demo_scoreboard_32x32. It does not expire. If you recreate the
#       entity, update the token from Developer Tools → States.
# =============================================================================

automation:
  - alias: "iDotMatrix – Push hockey scoreboard on image update"
    id: idotmatrix_hockey_push_image
    description: >
      Downloads the latest 32x32 PNG scoreboard and sends it to the iDotMatrix
      display whenever image.demo_scoreboard_32x32 is updated.

    trigger:
      - platform: state
        entity_id: image.demo_scoreboard_32x32

    condition:
      # Only act when the state actually changed (not just attribute refresh)
      - condition: template
        value_template: >
          {{ trigger.from_state.state != trigger.to_state.state }}

    action:
      # Step 1: Download the fresh PNG to www/idotmatrix/ so the coordinator
      #         can read it from disk (avoids the icon-cache problem with HTTP URLs).
      - service: shell_command.idotmatrix_fetch_scoreboard

      # Brief pause to ensure the file is flushed before the coordinator reads it.
      - delay: "00:00:01"

      # Step 2: Push the image layer to the iDotMatrix display.
      #         set_face applies to all loaded iDotMatrix coordinators.
      #         The coordinator resolves "hockey_scoreboard.png" relative to
      #         config/www/idotmatrix/ automatically.
      - service: idotmatrix.set_face
        data:
          face:
            layers:
              - id: "scoreboard"
                type: image
                image_path: "hockey_scoreboard.png"
                x: 0
                y: 0
                width: 32
                height: 32
