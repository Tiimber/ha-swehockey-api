# =============================================================================
# iDotMatrix Hockey Scoreboard
# =============================================================================
# Pushes the 32x32 PNG scoreboard to an iDotMatrix display whenever the
# image.demo_scoreboard_32x32 entity updates.
#
# HOW IT WORKS:
#   1. Triggers on image.demo_scoreboard_32x32 state change (timestamp changes
#      each time the image is regenerated by the HockeyLive coordinator).
#   2. shell_command.idotmatrix_fetch_scoreboard downloads the fresh PNG from
#      the HA image proxy to /config/www/idotmatrix/hockey_scoreboard.png.
#   3. idotmatrix.set_face is called with an image layer pointing at that file.
#      The iDotMatrix coordinator resolves "hockey_scoreboard.png" relative to
#      config/www/idotmatrix/ and sends it to the display via Bluetooth.
#
# SETUP (one-time):
#   1. Add to configuration.yaml shell_command: section:
#
#        shell_command:
#          idotmatrix_fetch_scoreboard: >-
#            curl -sf
#            -H 'Authorization: Bearer <YOUR_HA_LONG_LIVED_TOKEN>'
#            -o /config/www/idotmatrix/hockey_scoreboard.png
#            'http://127.0.0.1:8123/api/image_proxy/image.demo_scoreboard_32x32?token=<IMAGE_PROXY_TOKEN>'
#
#      Replace <YOUR_HA_LONG_LIVED_TOKEN> with a long-lived access token from
#      your HA profile. Replace <IMAGE_PROXY_TOKEN> with the access_token
#      attribute of image.demo_scoreboard_32x32 (Developer Tools → States).
#
#   2. Create the directory: mkdir -p /config/www/idotmatrix
#
#   3. Reload shell_command: Developer Tools → YAML → shell_command reload.
#
#   4. Deploy this automation via the HA REST API (see below) or place this
#      file in config/packages/ (requires packages support in configuration.yaml).
#
# DEPLOY VIA REST API:
#   POST http://<HA_HOST>:8123/api/config/automation/config/idotmatrix_hockey_push_image
#   Authorization: Bearer <token>
#   Content-Type: application/json
#   Body: JSON equivalent of the automation below
#   Then: POST /api/services/automation/reload
#
# NOTE: The image proxy requires Bearer auth from the HA host (token auth
#       returns 403 when called from localhost without a browser session).
# =============================================================================

automation:
  - alias: "iDotMatrix \u2013 Push hockey scoreboard on image update"
    id: idotmatrix_hockey_push_image
    description: >
      Downloads the latest 32x32 PNG scoreboard to disk then pushes it to the
      iDotMatrix display whenever image.demo_scoreboard_32x32 updates.

    trigger:
      - platform: state
        entity_id: image.demo_scoreboard_32x32

    condition:
      # Only act when the timestamp state actually changed (new image rendered)
      - condition: template
        value_template: >
          {{ trigger.from_state.state != trigger.to_state.state }}

    action:
      # Step 1: Download fresh PNG from HA image proxy to www/idotmatrix/
      - service: shell_command.idotmatrix_fetch_scoreboard

      # Step 2: Wait for file to be written before coordinator reads it
      - delay: "00:00:02"

      # Step 3: Push the image to the iDotMatrix display via set_face.
      #         The coordinator resolves "hockey_scoreboard.png" relative to
      #         config/www/idotmatrix/ and sends it via Bluetooth.
      - service: idotmatrix.set_face
        data:
          face:
            layers:
              - id: "scoreboard"
                type: image
                image_path: "hockey_scoreboard.png"
                x: 0
                y: 0
                width: 32
                height: 32

    mode: single
